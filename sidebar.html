<!DOCTYPE html>
<html lang="en"><span></span>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Santali Script Converter</title>
  <link rel="stylesheet" href="sidebar.css"/>
</head>
<body>
<div class="sidebar" id="sidebar">

  <!-- ── Header ──────────────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-left">
      <span class="logo" aria-hidden="true">ᱯᱟᱨᱥᱤ</span>
      <div>
        <div class="header-title">PARSI</div>
      </div>
    </div>
    <button class="icon-btn" id="settings-btn" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round">
        <circle cx="11" cy="11" r="2.8"/>
        <path d="M11 2v2M11 18v2M2 11h2M18 11h2M4.2 4.2l1.4 1.4M16.4 16.4l1.4 1.4M4.2 17.8l1.4-1.4M16.4 5.6l1.4-1.4"/>
      </svg>
    </button>
  </header>

  <!-- ── Direction picker ────────────────────────────────────────────── -->
  <section class="dir-section" aria-labelledby="dir-heading">
    <h2 class="section-heading" id="dir-heading">Choose direction</h2>
    <div class="dir-grid" role="radiogroup" aria-label="Translation direction">

      <button class="dir-card" data-dir="latin-olchiki" role="radio" aria-checked="false" tabindex="0">
        <div class="dir-langs">
          <span class="dir-lang latin-tag">Aa</span>
          <svg class="dir-arrow" viewBox="0 0 18 10" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 5h14M11 1l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="dir-lang oc-tag">ᱚᱞ</span>
        </div>
        <div class="dir-label">Santali Latin → Ol Chiki</div>
      </button>

      <button class="dir-card" data-dir="olchiki-latin" role="radio" aria-checked="false" tabindex="-1">
        <div class="dir-langs">
          <span class="dir-lang oc-tag">ᱚᱞ</span>
          <svg class="dir-arrow" viewBox="0 0 18 10" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 5h14M11 1l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="dir-lang latin-tag">Aa</span>
        </div>
        <div class="dir-label">Ol Chiki → Santali Latin</div>
      </button>

      <button class="dir-card" data-dir="english-olchiki" role="radio" aria-checked="false" tabindex="-1">
        <div class="dir-langs">
          <span class="dir-lang en-tag">EN</span>
          <svg class="dir-arrow" viewBox="0 0 18 10" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 5h14M11 1l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="dir-lang oc-tag">ᱚᱞ</span>
        </div>
        <div class="dir-label">English → Ol Chiki</div>
      </button>

      <button class="dir-card" data-dir="english-latin" role="radio" aria-checked="false" tabindex="-1">
        <div class="dir-langs">
          <span class="dir-lang en-tag">EN</span>
          <svg class="dir-arrow" viewBox="0 0 18 10" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 5h14M11 1l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="dir-lang latin-tag">Aa</span>
        </div>
        <div class="dir-label">English → Santali</div>
      </button>
          
      <button class="dir-card" data-dir="olchiki-english" role="radio" aria-checked="false" tabindex="-1">
       <div class="dir-langs">
        <span class="dir-lang oc-tag">ᱚᱞ</span>
        <svg class="dir-arrow" viewBox="0 0 18 10" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 5h14M11 1l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="dir-lang en-tag">EN</span>
      </div>
      <div class="dir-label">Ol Chiki → English</div>
    </button>

      <button class="dir-card" data-dir="latin-english" role="radio" aria-checked="false" tabindex="-1">
        <div class="dir-langs">
          <span class="dir-lang latin-tag">Aa</span>
          <svg class="dir-arrow" viewBox="0 0 18 10" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 5h14M11 1l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="dir-lang en-tag">EN</span>
        </div>
        <div class="dir-label">Santali Latin → English</div>
      </button>
    </div>
  </section>

  <!-- ── Input ────────────────────────────────────────────────────────── -->
  <section class="input-section">
    <div class="input-header">
      <span class="section-heading" id="input-lang-label">Santali (Latin)</span>
      <button class="use-sel-btn" id="use-sel-btn" title="Pull in highlighted page text">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1" y="3" width="12" height="8" rx="1.5"/><path d="M4 6h6M4 8.5h4" stroke-linecap="round"/></svg>
        Use selected text
      </button>
    </div>
    <div class="textarea-wrap">
      <textarea
        id="text-input"
        class="text-input"
        placeholder="Type or paste text here…"
        rows="5"
        maxlength="2000"
        aria-labelledby="input-lang-label"
      ></textarea>
      <span class="char-count" id="char-count">0 / 2000</span>
    </div>
    <button class="action-btn" id="action-btn">
      <svg viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M1 7h14M11 3l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span id="action-label">Convert to Ol Chiki</span>
    </button>
  </section>

  <!-- ── Swap ──────────────────────────────────────────────────────── -->
  <div class="swap-row">
  <button class="swap-btn" id="swap-btn" title="Swap input and output">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 7h12M13 4l3 3-3 3M16 13H4M7 10l-3 3 3 3"/>
    </svg>
    Swap
  </button>
</div>

  <!-- ── Loading ──────────────────────────────────────────────────────── -->
  <div class="loading-row" id="loading-row" style="display:none" aria-live="polite">
    <div class="spinner"></div>
    <span>Translating...</span>
  </div>

  <!-- ── Output ───────────────────────────────────────────────────────── -->
  <section class="output-section" id="output-section" style="display:none">
    <div class="output-header">
      <span class="section-heading" id="output-lang-label">Ol Chiki</span>
      <div class="output-actions">
        <div class="font-size-ctrl">
          <button class="font-btn" id="font-decrease" title="Decrease font size">A−</button>
          <button class="font-btn" id="font-increase" title="Increase font size">A+</button>
        </div>
        <button class="pill-btn" id="speak-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M2 5.5h3l4-3v11l-4-3H2z" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 5a4 4 0 0 1 0 6" stroke-linecap="round"/></svg>
    Speak
          </button>
          <button class="pill-btn" id="copy-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="5" y="5" width="9" height="11" rx="1.5" stroke-linecap="round"/><path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2h-6A1.5 1.5 0 0 0 2 3.5v9A1.5 1.5 0 0 0 3.5 14H5" stroke-linecap="round"/></svg>
          Copy
        </button>
        <button class="pill-btn" id="clear-btn">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 3l10 10M13 3L3 13" stroke-linecap="round"/></svg>
          Clear
        </button>
      </div>
    </div>
    <div class="output-text" id="output-text" aria-live="polite"></div>

    <!-- For English→Ol Chiki, also show the intermediate Santali Latin -->
    <div class="also-row" id="also-row" style="display:none">
      <span class="also-label" id="also-label">Also as Santali Latin</span>
      <span class="also-text"  id="also-text"></span>
      <button class="copy-small-btn" id="copy-also-btn" title="Copy Santali Latin">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="4" width="8" height="9" rx="1.2"/><path d="M9 4V3a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h1" stroke-linecap="round"/></svg>
      </button>
    </div>

    <!-- Error -->

        <!-- Phonetically transcribed words panel -->
        <div class="transcribed-panel" id="transcribed-panel" style="display:none">
          <button class="transcribed-toggle" id="transcribed-toggle" aria-expanded="false">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="8" cy="8" r="6.5"/><path d="M8 5.5v3M8 10.5h.01" stroke-linecap="round"/></svg>
            <span id="transcribed-count">0 words phonetically transcribed</span>
            <svg class="t-chevron" viewBox="0 0 12 7" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 1l5 5 5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="transcribed-body" id="transcribed-body" hidden>
            <p class="transcribed-note">These words weren't in the dictionary so they were sounded out phonetically into Santali Latin script, then converted to Ol Chiki.</p>
            <table class="transcribed-table" id="transcribed-table" aria-label="Phonetically transcribed words"></table>
          </div>
        </div>
        <div class="error-row" id="error-row" style="display:none">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="8" cy="8" r="6.5"/><path d="M8 5v3.5M8 10.5h.01" stroke-linecap="round"/></svg>
      <span id="error-msg"></span>
    </div>
  </section>

  <!-- ── History ───────────────────────────────────────────────────────── -->
  <section class="history-section">
    <button class="history-toggle" id="history-toggle" aria-expanded="false">
      <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="9" cy="9" r="7"/><path d="M9 5.5V9l2.5 2" stroke-linecap="round"/></svg>
      <span>Recent</span>
      <svg class="chevron" viewBox="0 0 14 8" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 1l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="history-panel" id="history-panel" hidden>
      <ul class="history-list" id="history-list" role="list"></ul>
      <div class="history-empty" id="history-empty" style="display:none">No recent conversions yet.</div>
      <button class="clear-hist-btn" id="clear-history-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 5h8l-.8 9H4.8L4 5zM2.5 5h11M6 5V3.5h4V5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Clear history
      </button>
    </div>
  </section>

</div><!-- /sidebar -->

<script src="transliteration.js"></script>
<script src="dictionary.js"></script>
<script src="sidebar.js"></script>
</body>
</html>
